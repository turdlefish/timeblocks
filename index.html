<style>
/* έΦΑέΦΑ VARIABLES έΦΑέΦΑ */
:root {
  --bg: #0e0e11;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: #2a2a35;
  --text: #e8e6f0;
  --text-muted: #7a7890;
  --accent: #c8b8ff;
  --accent2: #ff9f6e;
  --green: #6effb8;
  --red: #ff6e6e;
  --blue: #6ec8ff;
  --hour-h: 52px;
  --swatch-border: white;
}
:root.light {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface2: #f9f9f9;
  --border: #e0e0e0;
  --text: #1a1a2e;
  --text-muted: #999;
  --accent: #7c5cbf;
  --accent2: #d4700a;
  --green: #1a7a4a;
  --red: #c0392b;
  --blue: #1565c0;
  --swatch-border: #444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter',system-ui,sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  transition: background .25s, color .25s;
}

/* έΦΑέΦΑ HEADER έΦΑέΦΑ */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
}
.logo { display:flex; align-items:center; gap:9px; white-space:nowrap; flex-shrink:0; }
.logo-text { font-family:'Fraunces',serif; font-weight:900; font-size:1.4rem; letter-spacing:-1px; color:var(--accent); line-height:1; }
.header-right { display:flex; align-items:center; gap:8px; margin-left:auto; flex-wrap:wrap; }
.icon-btn { font-family:'Inter',system-ui,sans-serif; font-size:0.72rem; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 13px; border-radius:8px; cursor:pointer; white-space:nowrap; transition:border-color .15s,color .15s; }
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.pill-group { display:flex; background:var(--bg); border-radius:8px; padding:3px; border:1px solid var(--border); }
.pill-btn { background:none; border:none; color:var(--text-muted); font-family:'Inter',system-ui,sans-serif; font-size:0.72rem; padding:5px 14px; border-radius:6px; cursor:pointer; transition:all .2s; }
.pill-btn.active { background:var(--accent); color:#0e0e11; font-weight:700; }

/* έΦΑέΦΑ SIDEBAR έΦΑέΦΑ */
.app-body { display:flex; flex:1; min-height:0; overflow:hidden; }
.sidebar { width:264px; min-width:220px; flex-shrink:0; border-right:1px solid var(--border); background:var(--surface); overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:18px; }
.sidebar-section h3 { font-size:0.67rem; font-weight:700; color:var(--text); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
.form-input { font-family:'Inter',system-ui,sans-serif; font-size:0.78rem; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:8px; width:100%; transition:border-color .15s; }
.form-input:focus { outline:none; border-color:var(--accent); }

/* έΦΑέΦΑ MODAL έΦΑέΦΑ */
.modal-overlay { position:fixed; inset:0; background:#0009; z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity .2s; padding:20px; overflow-y:auto; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:26px; width:420px; max-width:95vw; max-height:90vh; overflow-y:auto; transform:translateY(20px); transition:transform .2s; flex-shrink:0; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal h2 { font-family:'Inter',system-ui,sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; margin-bottom:16px; color:var(--accent); text-transform:uppercase; }
.form-row { display:flex; flex-direction:column; gap:5px; margin-bottom:13px; }
.form-row label { font-size:0.63rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); }
.modal-btns { display:flex; gap:8px; margin-top:18px; }
.mbtns { display:flex; gap:8px; margin-top:18px; }
.btn-primary { flex:2; background:var(--accent); color:#0e0e11; font-family:'Inter',system-ui,sans-serif; font-size:0.8rem; font-weight:700; border:none; padding:10px; border-radius:8px; cursor:pointer; transition:opacity .2s; }
.btn-primary:hover { opacity:.85; }
.btn-cancel { flex:1; background:none; border:1px solid var(--border); color:var(--text-muted); font-family:'Inter',system-ui,sans-serif; font-size:0.8rem; padding:10px; border-radius:8px; cursor:pointer; transition:all .15s; }
.btn-cancel:hover { border-color:var(--text-muted); color:var(--text); }

/* έΦΑέΦΑ EMOJI / COLOR KEYBOARDS έΦΑέΦΑ */
/* Emoji keyboard */
.emoji-trigger {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px; cursor: pointer;
  font-size: 0.78rem; color: var(--text-muted);
  transition: border-color .15s; width: 100%;
}
.emoji-trigger:hover { border-color: var(--accent); }
.emoji-trigger .trigger-icon { font-size: 1.1rem; }
.emoji-trigger .trigger-label { font-size: 0.7rem; }
.emoji-keyboard-wrap { position: relative; }
.emoji-keyboard {
  position: absolute; top: calc(100% + 6px); left: 0;
  width: 300px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 8px 32px #0006;
  z-index: 400; display: none; flex-direction: column; overflow: hidden;
}
.emoji-keyboard.open { display: flex; }
.emoji-search { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.emoji-search input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'Inter',system-ui,sans-serif;
  font-size: 0.72rem; padding: 5px 10px; border-radius: 6px;
}
.emoji-search input:focus { outline: none; border-color: var(--accent); }
.emoji-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface2); overflow-x: auto; scrollbar-width: none;
}
.emoji-tabs::-webkit-scrollbar { display: none; }
.emoji-tab {
  flex-shrink: 0; padding: 7px 10px; font-size: 1rem; cursor: pointer;
  border-bottom: 2px solid transparent; transition: border-color .15s; line-height: 1;
}
.emoji-tab:hover { background: var(--surface); }
.emoji-tab.active { border-bottom-color: var(--accent); }
.emoji-grid-wrap { height: 200px; overflow-y: auto; padding: 6px; }
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; }
.emoji-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; border-radius: 6px; cursor: pointer; transition: background .1s; line-height: 1;
}
.emoji-cell:hover { background: var(--surface2); }
.emoji-cell.selected { background: var(--accent); }

/* Colour keyboard */
.color-keyboard {
  position: absolute; top: calc(100% + 6px); left: 0;
  width: 280px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 8px 32px #0006;
  z-index: 400; display: none; flex-direction: column; overflow: hidden;
}
.color-keyboard.open { display: flex; }
.color-kb-tabs {
  display: flex; background: var(--surface2); overflow-x: auto;
  scrollbar-width: none; flex-wrap: wrap; gap: 2px; padding: 4px;
  border-bottom: 1px solid var(--border);
}
.color-kb-tab {
  flex-shrink: 0; font-size: 0.62rem; font-weight: 700;
  padding: 4px 8px; border-radius: 5px; cursor: pointer;
  border: 1px solid transparent; color: var(--text-muted); transition: all .15s; white-space: nowrap;
}
.color-kb-tab.active { border-color: var(--accent); color: var(--accent); }
.color-kb-grid-wrap { padding: 8px; max-height: 160px; overflow-y: auto; }
.color-kb-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
.color-kb-swatch {
  aspect-ratio: 1; border-radius: 4px; cursor: pointer;
  border: 2px solid transparent; transition: border-color .12s, transform .12s;
}
.color-kb-swatch:hover { transform: scale(1.15); }
.color-kb-swatch.selected { border-color: var(--text); }


/* έΦΑέΦΑ MINI CALENDAR έΦΑέΦΑ */
/* έΨΙέΨΙ PASTE BACK: Mini Calendar CSS έΑΦ lines 930έΑΥ992 έΨΙέΨΙ */
/* έΦΑέΦΑ MINI CALENDAR (sidebar) έΦΑέΦΑ */
.mini-cal {
  width: 100%; user-select: none;
}
.mini-cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.mini-cal-title {
  font-size: 0.72rem; font-weight: 700; color: var(--text);
}
.mini-cal-nav-btn {
  background: none; border: none; color: var(--text-muted);
  font-size: 0.9rem; cursor: pointer; padding: 2px 6px;
  border-radius: 4px; transition: color .15s;
}
.mini-cal-nav-btn:hover { color: var(--accent); }
.mini-cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
}
.mini-cal-dow {
  text-align: center; font-size: 0.58rem; font-weight: 700;
  color: var(--text-muted); padding: 2px 0; text-transform: uppercase;
}
.mini-cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; border-radius: 4px; cursor: pointer;
  color: var(--text-muted); transition: background .12s, color .12s;
  position: relative;
}
.mini-cal-day:hover { background: var(--surface2); color: var(--text); }
.mini-cal-day.today { background: var(--accent); color: #0e0e11; font-weight: 700; border-radius: 50%; }
.mini-cal-day.has-blocks::after {
  content: ''; position: absolute; bottom: 2px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent2);
}
.mini-cal-day.other-month { opacity: 0.28; }
.mini-cal-day.selected { outline: 2px solid var(--accent); border-radius: 4px; }
.mini-cal-day.has-tasks::before {
  content: ''; position: absolute; top: 2px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--green);
}

/* έΦΑέΦΑ SCHEDULE PICKER (emoji keyboard style) έΦΑέΦΑ */
.sched-color-trigger, .sched-icon-trigger {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px; cursor: pointer;
  font-size: 0.78rem; color: var(--text-muted);
  transition: border-color .15s; width: 100%;
}
.sched-color-trigger:hover, .sched-icon-trigger:hover { border-color: var(--accent); }
.sched-picker-wrap { position: relative; }
.sched-picker-pop {
  position: absolute; top: calc(100% + 6px); left: 0;
  width: 300px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 8px 32px #0006;
  z-index: 400; display: none; flex-direction: column; overflow: hidden;
}
.sched-picker-pop.open { display: flex; }


/* έΦΑέΦΑ MONTHLY VIEW (schedule) έΦΑέΦΑ */
/* έΨΙέΨΙ PASTE BACK: Monthly View CSS έΑΦ lines 855έΑΥ929 έΨΙέΨΙ */
/* έΦΑέΦΑ MONTHLY VIEW έΦΑέΦΑ */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--bg);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 30;
}
.month-nav-title {
  font-family: 'Fraunces', serif; font-weight: 900;
  font-size: 1.1rem; letter-spacing: -0.5px; color: var(--accent);
}
.month-nav-btn {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  font-family: 'Inter',system-ui,sans-serif; font-size: 0.75rem; padding: 4px 10px;
  border-radius: 6px; cursor: pointer; transition: all .15s;
}
.month-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  min-width: 500px;
}
.month-day-header {
  text-align: center; padding: 8px 4px;
  font-size: 0.63rem; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 44px; z-index: 20;
}
.month-cell {
  min-height: 90px; padding: 6px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative; transition: background .15s;
  cursor: pointer;
}
.month-cell:nth-child(7n) { border-right: none; }
.month-cell:hover { background: var(--surface2); }
.month-cell.other-month .month-cell-num { opacity: 0.3; }
.month-cell.today .month-cell-num {
  background: var(--accent); color: #0e0e11;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.month-cell-num {
  font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
  margin-bottom: 4px; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.month-cell-week {
  font-size: 0.58rem; color: var(--text-muted); opacity: 0.6;
  position: absolute; top: 6px; right: 6px;
}
.month-block-chip {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 5px; border-radius: 4px; font-size: 0.62rem;
  margin-bottom: 2px; cursor: pointer; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
  transition: opacity .15s;
}
.month-block-chip:hover { opacity: .8; }
.month-block-chip .chip-icon { flex-shrink: 0; font-size: 0.7rem; }
.month-block-chip .chip-label { overflow: hidden; text-overflow: ellipsis; }
.month-more {
  font-size: 0.6rem; color: var(--text-muted);
  padding: 1px 4px; cursor: pointer;
}
.month-add-dot {
  position: absolute; bottom: 4px; right: 6px;
  font-size: 0.9rem; color: var(--text-muted); opacity: 0;
  transition: opacity .15s; line-height: 1;
}
.month-cell:hover .month-add-dot { opacity: 0.6; }


/* έΦΑέΦΑ CALENDAR COMPACT CSS έΦΑέΦΑ */
/* έΨΙέΨΙ PASTE BACK: Calendar CSS έΑΦ lines 993έΑΥ1063 έΨΙέΨΙ */
/* CALENDAR */
.cal-nav{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg);border-bottom:2px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.cal-title{font-family:'Fraunces',serif;font-weight:900;font-size:1.3rem;letter-spacing:-.5px;color:var(--accent);}
.cal-arr{background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'Inter',system-ui,sans-serif;font-size:.75rem;padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .15s;}
.cal-arr:hover{border-color:var(--accent);color:var(--accent);}
.cal-mwrap{flex:1;overflow:auto;}
.cal-m-dr{display:grid;grid-template-columns:repeat(7,1fr);position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-m-dh{text-align:center;padding:8px 4px;font-size:.64rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;}
.cal-m-grid{display:grid;grid-template-columns:repeat(7,1fr);min-width:500px;}
.cal-m-cell{min-height:120px;padding:6px 7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.cal-m-cell:nth-child(7n){border-right:none;}
.cal-m-cell:hover{background:var(--surface2);}
.cal-m-cell.cal-oth{opacity:.4;}
.cal-m-cell.cal-tod{background:color-mix(in srgb,var(--accent) 6%,var(--bg));}
.cal-m-cell.cal-dov{background:color-mix(in srgb,var(--accent2) 12%,var(--bg));outline:2px dashed var(--accent2);outline-offset:-2px;}
.cal-m-num{font-size:.7rem;font-weight:700;color:var(--text-muted);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:3px;}
.cal-m-cell.cal-tod .cal-m-num{background:var(--accent);color:#0e0e11;}
.cal-m-wk{font-size:.55rem;color:var(--text-muted);opacity:.5;float:right;margin-top:-22px;}
.cal-ec{display:flex;align-items:center;gap:3px;padding:2px 5px;border-radius:4px;font-size:.62rem;margin-bottom:2px;overflow:hidden;white-space:nowrap;cursor:grab;transition:opacity .1s;user-select:none;}
.cal-ec:hover{opacity:.75;}
.cal-ec.cdrag{opacity:.3;}
.cal-more{font-size:.6rem;color:var(--text-muted);cursor:pointer;}
.cal-more:hover{color:var(--accent);}
.cal-madd{position:absolute;bottom:4px;right:5px;font-size:.9rem;color:var(--text-muted);opacity:0;transition:opacity .1s;}
.cal-m-cell:hover .cal-madd{opacity:.4;}
.cal-wwrap{flex:1;overflow:auto;display:flex;flex-direction:column;}
.cal-w-hdr{display:grid;grid-template-columns:52px repeat(7,1fr);position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:2px solid var(--border);}
.cal-w-ch{text-align:center;padding:8px 4px;border-left:1px solid var(--border);}
.cal-w-ch-d{font-size:.64rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.cal-w-ch-n{font-size:1rem;font-weight:700;color:var(--text-muted);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:3px auto 0;}
.cal-w-ch.ctod .cal-w-ch-n{background:var(--accent);color:#0e0e11;}
.cal-w-body{flex:1;display:flex;overflow:auto;}
.cal-w-tc{width:52px;flex-shrink:0;position:sticky;left:0;background:var(--bg);z-index:4;}
.cal-w-tl{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 8px 0 0;font-size:.6rem;font-weight:700;color:var(--text-muted);}
.cal-w-days{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.cal-w-col{border-left:1px solid var(--border);position:relative;}
.cal-w-col.cdov{background:color-mix(in srgb,var(--accent2) 12%,var(--bg));}
.cal-w-hr{height:52px;border-bottom:1px solid var(--border)33;position:relative;cursor:pointer;transition:background .1s;}
.cal-w-hr:hover{background:var(--surface2);}
.cal-w-hr::after{content:'';position:absolute;left:0;right:0;top:50%;border-bottom:1px dashed var(--border);opacity:.4;}
.cal-w-ev{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 5px;font-size:.63rem;cursor:grab;overflow:hidden;z-index:3;display:flex;align-items:center;gap:3px;box-shadow:0 1px 6px #0003;transition:opacity .1s;user-select:none;}
.cal-w-ev:hover{opacity:.8;}
.cal-w-ev.cdrag{opacity:.3;}
.cal-dwrap{flex:1;overflow:auto;display:flex;flex-direction:column;}
.cal-d-adbar{padding:6px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;gap:6px;flex-wrap:wrap;min-height:34px;}
.cal-d-adc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-size:.68rem;cursor:pointer;transition:opacity .1s;}
.cal-d-adc:hover{opacity:.8;}
.cal-d-grid{flex:1;display:flex;overflow:auto;position:relative;}
.cal-d-tc{width:52px;flex-shrink:0;position:sticky;left:0;background:var(--bg);z-index:4;}
.cal-d-tl{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 8px 0 0;font-size:.6rem;font-weight:700;color:var(--text-muted);}
.cal-d-col{flex:1;border-left:1px solid var(--border);position:relative;}
.cal-d-hr{height:60px;border-bottom:1px solid var(--border)33;cursor:pointer;transition:background .1s;position:relative;}
.cal-d-hr:hover{background:var(--surface2);}
.cal-d-hr::after{content:'';position:absolute;left:0;right:0;top:50%;border-bottom:1px dashed var(--border);opacity:.4;}
.cal-d-ev{position:absolute;left:6px;right:6px;border-radius:8px;padding:5px 9px;cursor:grab;overflow:hidden;z-index:3;box-shadow:0 2px 10px #0004;transition:opacity .1s;user-select:none;}
.cal-d-ev:hover{opacity:.85;}
.cal-d-ev.cdrag{opacity:.3;}
.cal-d-ev-t{font-size:.72rem;font-weight:700;}
.cal-d-ev-tm{font-size:.6rem;opacity:.8;margin-top:1px;}

async function sbGet(key) {
  const r = await fetch(`${SB_URL}/rest/v1/tb_store?key=eq.${encodeURIComponent(key)}&select=value`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  if (!r.ok) return null;
  const rows = await r.json();
  return rows.length ? rows[0].value : null;
}

async function sbSet(key, value) {
  const payload = JSON.stringify({ key, value, updated_at: new Date().toISOString() });
  const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
  // Try PATCH (update existing row) first
  const patch = await fetch(
    `${SB_URL}/rest/v1/tb_store?key=eq.${encodeURIComponent(key)}`,
    { method: 'PATCH', headers, body: JSON.stringify({ value, updated_at: new Date().toISOString() }) }
  );
  if (patch.ok) return true;
  // Row doesn't exist yet έΑΦ INSERT
  const ins = await fetch(`${SB_URL}/rest/v1/tb_store`, { method: 'POST', headers, body: payload });
  if (!ins.ok) {
    const err = await ins.text().catch(() => String(ins.status));
    throw new Error('sbSet failed (' + ins.status + '): ' + err);
  }
  return true;
}

const colorKBState = { openFor: null, activeTab: 0 };
function openColorKeyboard(ctx) {
  if (colorKBState.openFor && colorKBState.openFor!==ctx) closeColorKeyboard(colorKBState.openFor);
  const kb = document.getElementById(ctx+'ColorKeyboard');
  if (!kb) return;
  if (kb.classList.contains('open')) { closeColorKeyboard(ctx); return; }
  colorKBState.openFor=ctx; colorKBState.activeTab=0;
  kb.classList.add('open');
  buildColorKB(ctx);
  setTimeout(()=>document.addEventListener('click',outsideColorClick),0);
}
function closeColorKeyboard(ctx) {
  const kb = document.getElementById((ctx||colorKBState.openFor)+'ColorKeyboard');
  if(kb) kb.classList.remove('open');
  colorKBState.openFor=null;
  document.removeEventListener('click',outsideColorClick);
}
function outsideColorClick(e) {
  const ctx=colorKBState.openFor; if(!ctx) return;
  const kb=document.getElementById(ctx+'ColorKeyboard');
  // schedColor context has trigger id 'schedColorTrigger', others follow ctx+'ColorTrigger'
  const triggerId = ctx==='schedColor' ? 'schedColorTrigger' : ctx+'ColorTrigger';
  const trigger=document.getElementById(triggerId);
  if(kb&&!kb.contains(e.target)&&(!trigger||!trigger.contains(e.target))) closeColorKeyboard(ctx);
}
function buildColorKB(ctx) {
  const kb=document.getElementById(ctx+'ColorKeyboard');
  if(!kb) return;
  kb.innerHTML=`
    <div class="color-kb-tabs" id="${ctx}ColorTabs" onclick="event.stopPropagation()">
      ${COLOR_KB_CATS.map((c,i)=>`<div class="color-kb-tab${i===0?' active':''}" onclick="colorKBTabClick('${ctx}',${i})">${c.label}</div>`).join('')}
    </div>
    <div class="color-kb-grid-wrap" onclick="event.stopPropagation()">
      <div class="color-kb-grid" id="${ctx}ColorGrid"></div>
    </div>`;
  renderColorKBGrid(ctx);
}
function colorKBTabClick(ctx,idx) {
  colorKBState.activeTab=idx;
  document.getElementById(ctx+'ColorTabs')?.querySelectorAll('.color-kb-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderColorKBGrid(ctx);
}
function renderColorKBGrid(ctx) {

function renderEmojiGrid(ctx) {
  const el = document.getElementById(ctx+'EmojiGrid');

      emojis = catMatch;

};

async function dsSave() {

}
async function dsLoad() {
  try {
    var v=await sbGet(wsKey('cal_status'));
    if(v){
      var raw=JSON.parse(v);
      // Migrate: wrap any plain object values into arrays
      Object.keys(raw).forEach(function(k){
        if(raw[k]&&!Array.isArray(raw[k])) raw[k]=[raw[k]];
      });
      ds.data=raw; ds.saved=v;
    }
  } catch(e) {}
  ds.loaded=true;
  dsCustomLoad().then(function(){ dsBuild(); dsTally(); });
}

};

function dsApply(dk2) {
  var t=dsAllTypes().find(function(x){return x.id===ds.active;});
  if(!t) return;
  if(t.isCounter) {
    // Counter: increment count on this day
    dsSnap();
    var arr=dsGetDay(dk2);
    var entry=arr.find(function(x){return x.type===ds.active;});
    if(entry){ entry.count=(entry.count||1)+1; }
    else { arr.push({type:ds.active,count:1}); }
    dsSetDay(dk2,arr);
    dsSave(); dsRefresh(); dsTally(); dsMiniCal();
    return;
  }
  if(t.hasDesc) {
    ds.pending=dk2;
    var m=document.getElementById('dsOtherModal');
    var dt=document.getElementById('dsOtherDate');
    var ei=document.getElementById('dsOtherEmoji');
    var di=document.getElementById('dsOtherDesc');
    if(dt) dt.textContent=dk2;
    if(ei) ei.value=t.icon;
    var ex=dsGetDay(dk2).find(function(x){return x.type===ds.active;});
    if(di) di.value=(ex&&ex.desc)||'';
    if(m)  m.style.display='flex';
  } else if(t.hours) {
    ds.pending=dk2;
    var m=document.getElementById('dsHrsModal');
    var lbl=document.getElementById('dsHrsLabel');
    var inp=document.getElementById('dsHrsInput');
    var dt=document.getElementById('dsHrsDate');
    if(lbl) lbl.textContent=t.icon+' '+t.label;
    if(dt)  dt.textContent=dk2;
    var existing=dsGetDay(dk2).find(function(x){return x.type===ds.active;});
    if(inp) inp.value=(existing&&existing.hrs)||DS_DEFAULT_HRS;
    if(m)   m.style.display='flex';
  } else {
    dsSnap();
    var arr=dsGetDay(dk2);
    var idx=arr.findIndex(function(x){return x.type===ds.active;});
    if(idx>=0) arr.splice(idx,1); else arr.push({type:ds.active});
    dsSetDay(dk2,arr);
    dsSave(); dsRefresh(); dsTally(); dsMiniCal();
  }
}

function dsInject() {
  var main=document.getElementById('cMain'); if(!main) return;
  var view=window.calSt?window.calSt.view:'month';

  // Month: span bars for consecutive same-type runs
  // Remove existing wraps and bar layer
  main.querySelectorAll('.ds-day-wrap').forEach(function(el){el.remove();});
  var oldLayer=main.querySelector('.ds-bar-layer'); if(oldLayer) oldLayer.remove();

  // Build ordered date map from visible cells
  var cells=Array.from(main.querySelectorAll('.cal-m-cell:not(.cal-oth)'));
  var grid=main.querySelector('.cal-m-grid');
  if(!grid||!cells.length) return;

  // Map date->cell
  var dateMap={};
  cells.forEach(function(cell){
    var oc=cell.getAttribute('onclick')||'';
    var m=oc.match(/cGoDay\('([^']+)'\)/)||oc.match(/cGoDay.'([^']+)'/);
    if(m){ cell._dsDate=m[1]; dateMap[m[1]]=cell; }
    cell.style.cursor=ds.active?'crosshair':'';
  });

  // Sort dates
  var allDates=Object.keys(dateMap).sort();

  // For each status type, find its consecutive runs independently
  // Also track how many bars are stacked on each date (for vertical offset)
  var stackCount={}; // dk2 -> count of bars placed so far
  var allTypes2=dsAllTypes();
  var runs=[];
  allTypes2.forEach(function(typeObj){
    var tid=typeObj.id;
    // Skip counter and emoji-only types έΑΦ they render as dots, not bars
    if(typeObj.isCounter||typeObj.displayMode==='emoji') return;
    // Get all dates that have this type
    var typeDates=allDates.filter(function(dk){
      return dsGetDay(dk).some(function(s){return s.type===tid;});
    });
    if(!typeDates.length) return;
    // Group into consecutive runs
    var i=0;
    while(i<typeDates.length){
      var run=[typeDates[i]];
      var j=i+1;
      while(j<typeDates.length){
        var prev=new Date(typeDates[j-1]+'T00:00:00');
        var next=new Date(typeDates[j]+'T00:00:00');
        if((next-prev)/(1000*60*60*24)!==1) break;
        run.push(typeDates[j]);
        j++;
      }
      // Get the entry for first date to pass hrs/desc
      var s0=dsGetDay(run[0]).find(function(s){return s.type===tid;})||{};
      runs.push({type:tid, dates:run, data:s0});
      i=j;
    }
  });
  // Sort runs so we draw them in a stable order (by type order)
  // stackCount tracks vertical slot per date


  // Create bar layer over the grid
  var layer=document.createElement('div');
  layer.className='ds-bar-layer';
  grid.appendChild(layer);

  var gridRect=grid.getBoundingClientRect();

  // For each run, slice into row segments (7 cols per row), draw a bar per segment
  runs.forEach(function(run){
    var t=dsAllTypes().find(function(x){return x.id===run.type;});
    if(!t) return;
    var s0=ds.data[run.dates[0]];
    var extraText=s0&&s0.hrs?' '+s0.hrs+'h':'';
    var titleText=t.label+(s0&&s0.hrs?' ('+s0.hrs+'h)':'')+(s0&&s0.desc?' \u2014 '+s0.desc:'');

    // Slice into row-level segments
    var segments=[];
    var seg=null;
    run.dates.forEach(function(dk,idx){
      var cell=dateMap[dk]; if(!cell) return;
      var cellRect=cell.getBoundingClientRect();
      // Row index = which grid row (7 cells wide, Monday=col0)
      var colIdx=cells.indexOf(cell)%7;
      if(!seg||colIdx===0){
        if(seg) segments.push(seg);
        seg={start:dk,end:dk,startCell:cell,endCell:cell};
      } else {
        seg.end=dk; seg.endCell=cell;
      }
    });
    if(seg) segments.push(seg);

    var BAR_H=24, BAR_GAP=3, BAR_TOP=28;
    segments.forEach(function(sg,si){
      var r1=sg.startCell.getBoundingClientRect();
      var r2=sg.endCell.getBoundingClientRect();
      // Determine stack slot for this segment's first date
      var slot=stackCount[sg.start]||0;
      // Update stackCount for all dates in this segment
      var d=new Date(sg.start+'T00:00:00');
      var dEnd=new Date(sg.end+'T00:00:00');
      while(d<=dEnd){
        var dk3=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        stackCount[dk3]=(stackCount[dk3]||0)+1;
        d.setDate(d.getDate()+1);
      }
      var top=r1.top-gridRect.top+BAR_TOP+(slot*(BAR_H+BAR_GAP));
      var left=r1.left-gridRect.left+1;
      var right=r2.right-gridRect.left-1;
      var width=right-left;

      var bar=document.createElement('div');
      bar.className='ds-span-bar';
      bar.title=titleText+' (click έεΧ to remove)';
      // Stamp: use color as ink color, CSS handles tinted fill via box-shadow
      bar.style.cssText=(
        'top:'+top+'px;left:'+left+'px;width:'+width+'px;height:'+BAR_H+'px;'
        +'color:'+t.color+';position:absolute;'
      );
      var labelHtml=(si===0)
        ?'<span class="ds-span-icon">'+t.icon+'</span><span class="ds-span-label">'+t.label+extraText+'</span>'
        :'<span class="ds-span-icon">'+t.icon+'</span>';
      // Delete button removes this type from ALL dates in the run
      var delDates=run.dates.join(',');
      var delBtn='<button class="ds-bar-del" title="Remove" '
        +'onclick="event.stopPropagation();(function(){';
      delBtn+='var dates=\''+delDates+'\'.split(\',\');';
      delBtn+='dates.forEach(function(d){dsDeleteStatus(d,\''+run.type+'\');});';
      delBtn+='})()" >├Ω</button>';
      bar.innerHTML=labelHtml+delBtn;
      layer.appendChild(bar);
    });
  });


  // Counter types: render emoji dots at bottom of each cell
  cells.forEach(function(cell){
    var oc=cell.getAttribute('onclick')||'';
    var cm=oc.match(/cGoDay.'([^']+)'/);
    if(!cm) return;
    var dk2c=cm[1];
    cell.querySelectorAll('.ds-counter-dots').forEach(function(el){el.remove();});
    var counterStatuses=dsGetDay(dk2c).filter(function(s){
      var tc=dsAllTypes().find(function(x){return x.id===s.type;});
      return tc&&(tc.isCounter||tc.displayMode==='emoji');
    });
    if(!counterStatuses.length) return;
    var dotsWrap=document.createElement('div');
    dotsWrap.className='ds-counter-dots';
    counterStatuses.forEach(function(s){
      var tc=dsAllTypes().find(function(x){return x.id===s.type;});
      if(!tc) return;
      var count=s.count||1;
      for(var ci=0;ci<count;ci++){
        var dot=document.createElement('span');
        dot.className='ds-counter-dot';
        dot.title=tc.label+' ('+count+'x) έΑΦ click to add, right-click to remove';
        dot.textContent=tc.icon;
        dot.style.color=tc.color;
        (function(sType,dk2cc){
          dot.addEventListener('click',function(e){
            e.stopPropagation();
            if(ds.active===sType){ dsApply(dk2cc); }
          });
          dot.addEventListener('contextmenu',function(e){
            e.preventDefault(); e.stopPropagation();
            dsSnap();
            var arr=dsGetDay(dk2cc);
            var entry=arr.find(function(x){return x.type===sType;});
            if(entry&&entry.count>1){ entry.count--; }
            else { dsDeleteStatus(dk2cc,sType); return; }
            dsSetDay(dk2cc,arr);
            dsSave(); dsRefresh(); dsTally(); dsMiniCal();
          });
        })(s.type, dk2c);
        dotsWrap.appendChild(dot);
      }
    });
    cell.appendChild(dotsWrap);
  });

  // Week: chips at top of each day column header
  main.querySelectorAll('.cal-w-ch').forEach(function(ch){
    ch.querySelectorAll('.ds-col-wrap').forEach(function(el){el.remove();});
  });
  main.querySelectorAll('.cal-w-col[data-date]').forEach(function(col){
    var dk2=col.dataset.date;
    // Remove old wrap from col
    col.querySelectorAll('.ds-col-wrap').forEach(function(el){el.remove();});
    // Find the corresponding header cell
    var hdr=main.querySelector('.cal-w-hdr');
    var colIdx=Array.from(main.querySelectorAll('.cal-w-col')).indexOf(col);
    var hdrCells=hdr?Array.from(hdr.querySelectorAll('.cal-w-ch')):[];
    var hdrCell=hdrCells[colIdx];
    var statuses=dsGetDay(dk2);
    if(statuses.length&&hdrCell){
      var wrap=document.createElement('div');
      wrap.className='ds-col-wrap';
      statuses.forEach(function(s){
        var t=dsAllTypes().find(function(x){return x.id===s.type;}); if(!t) return;
        var extra=s.hrs?' '+s.hrs+'h':'';
        var chip=document.createElement('span');
        chip.className='ds-col-chip';
        chip.style.cssText='color:'+t.color+';';
        chip.title=t.label+(s.hrs?' ('+s.hrs+'h)':'')+(s.desc?' έΑΦ '+s.desc:'');
        chip.innerHTML=t.icon+' '+t.label+extra
          +'<button class="ds-chip-del" title="Remove" '
          +'onclick="event.stopPropagation();dsDeleteStatus(\''+dk2+'\',\''+s.type+'\')">├Ω</button>';
        wrap.appendChild(chip);
      });
      hdrCell.appendChild(wrap);
    }
    // Click to stamp in week view
    col.addEventListener('click',function(e){
      if(!ds.active||e.target.closest('.cal-w-ev')||e.target.closest('.ds-chip-del')) return;
      e.stopPropagation(); dsApply(dk2);
    },true);
  });

  // Day: chips in nav bar
  var nav=main.querySelector('.cal-nav');
  if(nav){
    nav.querySelectorAll('.ds-day-nav').forEach(function(el){el.remove();});
    var dk2d='';
    var dc=document.getElementById('cDCol');
    if(dc&&dc.dataset.date) dk2d=dc.dataset.date;
    if(!dk2d&&window.calSt&&window.calSt.dd){
      var dd2=window.calSt.dd;
      dk2d=dd2.getFullYear()+'-'+String(dd2.getMonth()+1).padStart(2,'0')+'-'+String(dd2.getDate()).padStart(2,'0');
    }
    if(dk2d){
      var dayStatuses=dsGetDay(dk2d);
      if(dayStatuses.length){
        var navWrap=document.createElement('div');
        navWrap.className='ds-day-nav ds-day-nav-wrap';
        dayStatuses.forEach(function(s2){
          var t2=dsAllTypes().find(function(x){return x.id===s2.type;}); if(!t2) return;
          var extra2=s2.hrs?' '+s2.hrs+'h':'';
          var chip2=document.createElement('span');
          chip2.className='ds-col-chip';
          chip2.style.cssText='color:'+t2.color+';font-size:.65rem;';
          chip2.title=t2.label+(s2.hrs?' ('+s2.hrs+'h)':'')+(s2.desc?' έΑΦ '+s2.desc:'');
          chip2.innerHTML=t2.icon+' '+t2.label+extra2
            +'<button class="ds-chip-del" title="Remove" '
            +'onclick="event.stopPropagation();dsDeleteStatus(\''+dk2d+'\',\''+s2.type+'\')">├Ω</button>';
          navWrap.appendChild(chip2);
        });
        nav.appendChild(navWrap);
      }
      var dcol=document.getElementById('cDCol');
      if(dcol){
        dcol.addEventListener('click',function(e){
          if(!ds.active||e.target.closest('.cal-d-ev')||e.target.closest('.ds-chip-del')) return;
          e.stopPropagation(); dsApply(dk2d);
        },true);
      }
    }
  }
}

// έΦΑέΦΑ Tally έΦΑέΦΑ
function dsTally() {
  var el=document.getElementById('dsTally');
  var yrSel=document.getElementById('dsTallyYrSel');
  if(!el) return;

  var year=yrSel?parseInt(yrSel.value):new Date().getFullYear();
  var useFY=document.getElementById('dsTallyFY')&&document.getElementById('dsTallyFY').classList.contains('on');

  var counts={}, hrs={};
  dsAllTypes().forEach(function(t){counts[t.id]=0;hrs[t.id]=0;});

  Object.keys(ds.data).forEach(function(dk2){
    var d=new Date(dk2);
    var inRange;
    if(useFY){
      inRange=d>=new Date(year-1,6,1)&&d<=new Date(year,5,30);
    } else {
      inRange=dk2.startsWith(String(year)+'-');
    }
    if(!inRange) return;
    dsGetDay(dk2).forEach(function(s){
      counts[s.type]=(counts[s.type]||0)+1;
      var t=dsAllTypes().find(function(x){return x.id===s.type;});
      if(t&&t.hours) hrs[s.type]=(hrs[s.type]||0)+(s.hrs||DS_DEFAULT_HRS);
    });
  });

  var rows=dsAllTypes().filter(function(t){return counts[t.id]>0;}).map(function(t){
    var h=hrs[t.id]>0?'<span class="ds-tally-hrs">'+hrs[t.id]+'h</span>':'';
    return '<div class="ds-tally-row">'
      +'<span class="ds-tally-label">'+t.icon+' '+t.label+'</span>'
      +'<span class="ds-tally-val">'+counts[t.id]+'d '+h+'</span></div>';
  }).join('');

  el.innerHTML=rows||'<p style="font-size:.7rem;color:var(--text-muted)">No statuses logged yet.</p>';
}

window.dsPrintTally=function(fromDate,toDate){
  var period;
  if(fromDate&&toDate){
    period=fromDate+' έΑΦ '+toDate;
  } else {
    var yrSel=document.getElementById('dsTallyYrSel');
    var year=yrSel?parseInt(yrSel.value):new Date().getFullYear();
    var useFY=document.getElementById('dsTallyFY')&&document.getElementById('dsTallyFY').classList.contains('on');
    period=useFY?'Financial Year '+(year-1)+'/'+year:'Year '+year;
    fromDate=useFY?(year-1)+'-07-01':year+'-01-01';
    toDate=useFY?year+'-06-30':year+'-12-31';
  }
  var allTypes=dsAllTypes();
  var counts={},hrs={};
  allTypes.forEach(function(t){counts[t.id]=0;hrs[t.id]=0;});
  Object.keys(ds.data).forEach(function(dk2){
    var inRange=dk2>=fromDate&&dk2<=toDate;
    if(!inRange) return;
    dsGetDay(dk2).forEach(function(s){
      counts[s.type]=(counts[s.type]||0)+1;
      var t=allTypes.find(function(x){return x.id===s.type;});
      if(t&&t.hours) hrs[s.type]=(hrs[s.type]||0)+(s.hrs||DS_DEFAULT_HRS);
    });
  });
  var rows=allTypes.filter(function(t){return counts[t.id]>0;}).map(function(t){
    var h=hrs[t.id]>0?' / '+hrs[t.id]+' hours':'';
    return '<tr><td>'+t.icon+' '+t.label+'</td><td>'+counts[t.id]+' days'+h+'</td></tr>';
  }).join('');
  var win=window.open('','_blank');
  if(!win) return;
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Status Tally έΑΦ '+period+'</title>'
    +'<style>body{font-family:"Inter",system-ui,sans-serif;padding:40px;color:#1a1a2e;max-width:600px;margin:0 auto}'
    +'h1{font-size:1.3rem;margin-bottom:4px}p{color:#888;font-size:.85rem;margin-bottom:24px}'
    +'table{width:100%;border-collapse:collapse}th{text-align:left;border-bottom:2px solid #1a1a2e;padding:10px 12px;font-size:.75rem;text-transform:uppercase;letter-spacing:1px}'
    +'td{padding:10px 12px;border-bottom:1px solid #e0ddd8;font-size:.9rem}'
    +'.btn{position:fixed;top:16px;right:16px;background:#7c5cbf;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:sans-serif;font-size:13px;font-weight:700;cursor:pointer}'
    +'@media print{.btn{display:none}}</style></head><body>'
    +'<button class="btn" onclick="window.print()">ΏθΨρΎ╕Π Print</button>'
    +'<h1>ΏθΥΖ Status Tally</h1><p>'+period+'</p>'
    +'<table><tr><th>Status</th><th>Total</th></tr>'+rows+'</table>'
    +'</body></html>');
  win.document.close();
};

// έΦΑέΦΑ Mini calendar έΦΑέΦΑ
var dsMiniY=new Date().getFullYear(), dsMiniM=new Date().getMonth();

function dsMiniCal() {
  var el=document.getElementById('calMiniCal'); if(!el) return;
  var y=dsMiniY,m=dsMiniM,f=new Date(y,m,1),l=new Date(y,m+1,0);
  var sd=(f.getDay()+6)%7,tot=Math.ceil((sd+l.getDate())/7)*7;
  var now=new Date();
  var tk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var mn=f.toLocaleString('default',{month:'short'});
  var h='<div class="mini-cal-nav">'
    +'<button class="mini-cal-nav-btn" onclick="dsMiniNav(-1)">&#9664;</button>'
    +'<span class="mini-cal-title">'+mn+' '+y+'</span>'
    +'<button class="mini-cal-nav-btn" onclick="dsMiniNav(1)">&#9654;</button></div>'
    +'<div class="mini-cal-grid">'+['M','T','W','T','F','S','S'].map(function(d){return'<div class="mini-cal-dow">'+d+'</div>';}).join('');
  for(var i=0;i<tot;i++){
    var dn=i-sd+1,v=dn>=1&&dn<=l.getDate();
    var dk2=v?y+'-'+String(m+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0'):'';
    var isToday=v&&dk2===tk;
    var sArr=v?dsGetDay(dk2):[];
    var s=sArr.length?sArr[0]:null;
    var t=s?dsAllTypes().find(function(x){return x.id===s.type;}):null;
    var dot=t?'<span style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:'+t.color+'"></span>':'';
    h+='<div class="mini-cal-day'+(v?'':' other-month')+(isToday?' today':'')+'"'
      +(v?' onclick="dsMiniClick(\''+dk2+'\')" style="position:relative;'+(ds.active?'cursor:crosshair;':'')+(s?'background:color-mix(in srgb,'+t.color+' 20%,var(--surface))':'')+'"':'')
      +'>'+dot+(v?dn:'')+'</div>';
  }
  el.innerHTML=h+'</div>';
}
window.dsMiniNav=function(d){dsMiniM+=d;if(dsMiniM<0){dsMiniM=11;dsMiniY--;}if(dsMiniM>11){dsMiniM=0;dsMiniY++;}dsMiniCal();};
window.dsMiniClick=function(dk2){
  if(ds.active){dsApply(dk2);return;}
  if(window.cGoDay) window.cGoDay(dk2);
};

// έΦΑέΦΑ Tally mini calendars έΦΑέΦΑ
var tmcState={
  status:{y:new Date().getFullYear(),m:new Date().getMonth()},
  events:{y:new Date().getFullYear(),m:new Date().getMonth()}
};

window.tmcNav=function(which,dir){
  var s=tmcState[which];
  s.m+=dir;
  if(s.m<0){s.m=11;s.y--;}
  if(s.m>11){s.m=0;s.y++;}
  tmcRender(which);
};

function tmcRender(which){
  var s=tmcState[which];
  var y=s.y,m=s.m;
  var f=new Date(y,m,1),l=new Date(y,m+1,0);
  var sd=(f.getDay()+6)%7,tot=Math.ceil((sd+l.getDate())/7)*7;
  var now=new Date();
  var tk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  // Title
  var titleEl=document.getElementById('tmc'+which.charAt(0).toUpperCase()+which.slice(1)+'Title');
  if(titleEl) titleEl.textContent=f.toLocaleString('default',{month:'short',year:'numeric'});
  // DOW headers (only render once)
  var dowEl=document.getElementById('tmc'+which.charAt(0).toUpperCase()+which.slice(1)+'Dow');
  if(dowEl&&!dowEl.children.length){
    dowEl.innerHTML=['M','T','W','T','F','S','S'].map(function(d){
      return '<div class="tmc-dow">'+d+'</div>';
    }).join('');
  }
  // Grid
  var gridEl=document.getElementById('tmc'+which.charAt(0).toUpperCase()+which.slice(1)+'Grid');
  if(!gridEl) return;
  var cells='';
  for(var i=0;i<tot;i++){
    var dn=i-sd+1,v=dn>=1&&dn<=l.getDate();
    var dk2=v?y+'-'+String(m+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0'):'';
    var isToday=v&&dk2===tk;
    var inner='<div class="tmc-num">'+( v?dn:'')+'</div>';
    if(v&&which==='status'){
      var statuses=dsGetDay(dk2);
      var barSts=statuses.filter(function(s){
        var t=dsAllTypes().find(function(x){return x.id===s.type;});
        return t&&!t.isCounter&&t.displayMode!=='emoji';
      });
      var dotSts=statuses.filter(function(s){
        var t=dsAllTypes().find(function(x){return x.id===s.type;});
        return t&&(t.isCounter||t.displayMode==='emoji');
      });
      if(barSts.length){
        inner+='<div class="tmc-stamps">';
        barSts.forEach(function(s){
          var t=dsAllTypes().find(function(x){return x.id===s.type;}); if(!t) return;
          var extra=s.hrs?' '+s.hrs+'h':'';
          inner+='<div class="tmc-stamp" style="color:'+t.color+'">'+t.icon+' '+t.label+extra+'</div>';
        });
        inner+='</div>';
      }
      if(dotSts.length){
        inner+='<div class="tmc-counter-dots">';
        dotSts.forEach(function(s){
          var t=dsAllTypes().find(function(x){return x.id===s.type;}); if(!t) return;
          var cnt=s.count||1;
          for(var ci=0;ci<Math.min(cnt,6);ci++) inner+='<span class="tmc-dot">'+t.icon+'</span>';
        });
        inner+='</div>';
      }
    }
    if(v&&which==='events'){
      var evs=(window.calSt&&window.calSt.events?window.calSt.events:[]).filter(function(e){
        return e.date===dk2;
      }).sort(function(a,b){return (a.st||'').localeCompare(b.st||'');});
      evs.slice(0,3).forEach(function(e){
        var tc=e.color?(function(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000<128?'#fff':'#1a1a2e';})(e.color):'#1a1a2e';
        inner+='<div class="tmc-event" style="background:'+(e.color||'#c8b8ff')+';color:'+tc+'">'+e.icon+' '+e.title+'</div>';
      });
      if(evs.length>3) inner+='<div style="font-size:.55rem;color:var(--text-muted)">+'+( evs.length-3)+' more</div>';
    }
    cells+='<div class="tmc-cell'+(v?'':' other')+(isToday?' today':'')+'">'+inner+'</div>';
  }
  gridEl.innerHTML=cells;
}

function tmcRenderAll(){
  tmcRender('status');
  tmcRender('events');
}

function dsInitTallyYrSel(){
  var sel=document.getElementById('dsTallyYrSel2'); if(!sel||sel.options.length) return;
  var yr=new Date().getFullYear();
  for(var y=yr+1;y>=yr-5;y--){
    var o=document.createElement('option'); o.value=y; o.textContent=y;
    if(y===yr) o.selected=true; sel.appendChild(o);
  }

function dsTallyFull(){
  var el=document.getElementById('dsTallyFull'); if(!el) return;
  var yrSel=document.getElementById('dsTallyYrSel2');
  var year=yrSel?parseInt(yrSel.value):new Date().getFullYear();
  var useFY=document.getElementById('dsTallyFY2')&&document.getElementById('dsTallyFY2').classList.contains('on');
  var allTypes=dsAllTypes();
  var counts={},hrs={};
  allTypes.forEach(function(t){counts[t.id]=0;hrs[t.id]=0;});
  Object.keys(ds.data).forEach(function(dk2){
    var d=new Date(dk2),inRange;
    if(useFY) inRange=d>=new Date(year-1,6,1)&&d<=new Date(year,5,30);
    else inRange=dk2.startsWith(String(year)+'-');
    if(!inRange) return;
    dsGetDay(dk2).forEach(function(s){
      counts[s.type]=(counts[s.type]||0)+1;
      var t=allTypes.find(function(x){return x.id===s.type;});
      if(t&&t.hours) hrs[s.type]=(hrs[s.type]||0)+(s.hrs||DS_DEFAULT_HRS);
    });
  });
  var types=allTypes.filter(function(t){return counts[t.id]>0;});
  if(!types.length){
    el.innerHTML='<p style="color:var(--text-muted);font-size:.8rem">No statuses recorded for this period.</p>';
    return;
  }
  el.innerHTML=types.map(function(t){
    var hrsText=hrs[t.id]>0?hrs[t.id]+' hours total':'';
    return '<div class="tally-card" style="border-left:4px solid '+t.color+'">'
      +'<div class="tally-card-icon">'+t.icon+'</div>'
      +'<div class="tally-card-info"><div class="tally-card-label">'+t.label+'</div>'
      +(hrsText?'<div class="tally-card-sub">'+hrsText+'</div>':'')+'</div>'
      +'<div style="text-align:right"><div class="tally-card-count">'+counts[t.id]+'</div>'
      +'<div class="tally-card-hrs">days</div></div>'
      +'</div>';
  }).join('');
}

async function initCalendarWorkingCopy() {
  // Set auth user έΑΦ matches testuser workspace in Supabase
  authUser = { username: 'testuser', ws: 'testuser' };

  // Init DS year selector
  const sel = document.getElementById('dsTallyYrSel');
  if (sel && !sel.options.length) {
    const yr = new Date().getFullYear();
    for (let y = yr+1; y >= yr-5; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y; if (y === yr) o.selected = true;
      sel.appendChild(o);
    }
  }

  // Init DS day panel select
  const dsel = document.getElementById('dsDayPanelSel');
  if (dsel && !dsel.options.length) {
    DS_TYPES.forEach(function(t) {
      const o = document.createElement('option');
      o.value = t.id; o.textContent = t.icon + ' ' + t.label;
      dsel.appendChild(o);
    });
  }

  // Activate the panel FIRST so render has dimensions
  const panel = document.getElementById('panelCalendar');
  if (panel) panel.classList.add('active');

  // Load data (awaited so everything is ready before user can click)
  try { if (typeof cLoad === 'function') await cLoad(); } catch(e) { console.warn('cLoad error', e); }
  try { if (typeof dsLoad === 'function') await dsLoad(); } catch(e) { console.warn('dsLoad error', e); }

  // Render everything
  if (window.calRa) window.calRa();
  if (typeof dsBuild === 'function') dsBuild();
  if (typeof dsMiniCal === 'function') dsMiniCal();
  if (typeof dsTally === 'function') dsTally();
  setTimeout(() => { if (typeof dsInject === 'function') dsInject(); }, 100);

  // Hide loading overlay
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) { overlay.classList.add('hidden'); setTimeout(() => overlay.style.display='none', 400); }
}
